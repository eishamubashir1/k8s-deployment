apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: app-backend
  template:
    metadata:
      labels:
        app: app-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image }}:{{ .Values.backend.tag }}"
          imagePullPolicy: Never
          env:
            - name: DB_HOST
              value: "db-service"
            - name: DB_PASSWORD
              value: "{{ .Values.db.password }}"
          ports:
            - containerPort: {{ .Values.backend.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.port }}
  selector:
    app: app-backend
