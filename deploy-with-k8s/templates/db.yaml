apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-db
  template:
    metadata:
      labels:
        app: app-db
    spec:
      containers:
        - name: database
          image: "{{ .Values.db.image }}"
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "{{ .Values.db.password }}"
          ports:
            - containerPort: {{ .Values.db.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: db-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.db.port }}
  selector:
    app: app-db
