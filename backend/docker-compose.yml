version: '3.8'

services:

  # FRONTEND - Apache HTTPD
  frontend:
    image: httpd:latest
    container_name: my_frontend
    ports:
      - "88:88"
    volumes:
      - ./frontend/:/usr/local/apache2/htdocs
      - ./httpd-proxy.conf:/usr/local/apache2/conf/extra/proxy.conf
    depends_on:
      - backend
    networks:
      - webnet
    restart: always

  # BACKEND - Node.js + Express
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/mywebsite
      - NODE_ENV=production
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - mongo
    networks:
      - webnet
    restart: always

  # DATABASE - MongoDB
  mongo:
    image: mongo:6
    container_name: my_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - webnet
    restart: always

  # MONGO EXPRESS 
  mongo-express:
    image: mongo-express:latest
    container_name: mongo_gui
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
    depends_on:
      - mongo
    networks:
      - webnet
    restart: always

volumes:
  mongo_data:

networks:
  webnet:
    driver: bridge
